name: Broker Upload CI Bridge
description: Request an artifact-upload grant from Auth Broker, optionally zstd-compress files, upload through presigned storage URLs, and register the publication.

inputs:
  broker_url:
    description: Auth broker base URL
    required: true
  project:
    description: Project id configured in broker policy for this repository
    required: true
  session_id:
    description: Broker session id returned by Broker Auth
    required: true
  ecosystem:
    description: Artifact ecosystem
    required: true
  channel:
    description: Artifact channel
    required: true
  version:
    description: Artifact version
    required: true
  user_agent:
    description: User-Agent header sent to broker endpoints
    required: false
    default: auth-broker-x-ci/1.0
  artifact_root:
    description: Root directory allowed for artifact upload paths
    required: false
    default: dist
  files_manifest_path:
    description: Path to a JSON file that lists artifact filename, local path, and optional content_type
    required: true
  compress_uploads:
    description: Whether to zstd-compress artifact files before requesting upload grants
    required: false
    default: "false"
  compression_level:
    description: Zstandard compression level used when compress_uploads is true
    required: false
    default: "3"
  cf_access_client_id:
    description: Cloudflare Access service token Client ID
    required: false
    default: ""
  cf_access_client_secret:
    description: Cloudflare Access service token Client Secret
    required: false
    default: ""
  setup_python:
    description: Whether this action should install/select Python before running the upload sidecar
    required: false
    default: "true"
  python_version:
    description: Python version used by the upload sidecar when setup_python is enabled
    required: false
    default: "3.14"

outputs:
  upload_grant_id:
    description: Artifact upload grant id
    value: ${{ steps.broker_upload.outputs.upload_grant_id }}
  artifact_publication_id:
    description: Artifact publication id
    value: ${{ steps.broker_upload.outputs.artifact_publication_id }}
  artifact_publication_status:
    description: Artifact publication status
    value: ${{ steps.broker_upload.outputs.artifact_publication_status }}
  artifact_uploads_json:
    description: Upload entries returned by broker
    value: ${{ steps.broker_upload.outputs.artifact_uploads_json }}

runs:
  using: composite
  steps:
    - name: Set up Python
      if: ${{ inputs.setup_python == 'true' }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python_version }}

    - name: Run broker upload sidecar
      id: broker_upload
      shell: bash
      env:
        BROKER_URL: ${{ inputs.broker_url }}
        PROJECT: ${{ inputs.project }}
        SESSION_ID: ${{ inputs.session_id }}
        ECOSYSTEM: ${{ inputs.ecosystem }}
        CHANNEL: ${{ inputs.channel }}
        VERSION: ${{ inputs.version }}
        BROKER_USER_AGENT: ${{ inputs.user_agent }}
        ARTIFACT_ROOT: ${{ inputs.artifact_root }}
        FILES_MANIFEST_PATH: ${{ inputs.files_manifest_path }}
        COMPRESS_UPLOADS: ${{ inputs.compress_uploads }}
        COMPRESSION_LEVEL: ${{ inputs.compression_level }}
        CF_ACCESS_CLIENT_ID: ${{ inputs.cf_access_client_id }}
        CF_ACCESS_CLIENT_SECRET: ${{ inputs.cf_access_client_secret }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: |
        set -euo pipefail

        if command -v python3 >/dev/null 2>&1; then
          PYTHON_BIN=python3
        elif command -v python >/dev/null 2>&1; then
          PYTHON_BIN=python
        else
          echo "python3 or python is required to run this action" >&2
          exit 1
        fi

        "$PYTHON_BIN" "${{ github.action_path }}/scripts/broker_upload.py"
